services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U billiard_root -d billiard"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: billiard
      POSTGRES_USER: billiard_root
      POSTGRES_PASSWORD: change_me_strong_random
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - billiard_internal

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/caddy/Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - billiard_internal

